experiment:
  id: exp2
  name: exp2_cnn_aug
  description: SimpleCNN with data augmentation
model:
  type: simple_cnn
  num_classes: 10
data:
  dataset: CIFAR10
  data_dir: 源代码/data
  val_ratio: 0.1
  augmentation: true
  num_workers: 4
  download: true
training:
  seed: 42
  batch_size: 256
  epochs: 20
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.0005
  momentum: 0.9
  scheduler: cosine
output:
  output_dir: 实验结果
